limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
map_hash_bucket_size 128;

upstream gateway-service {
    server gateway-service:5000;
}

# =========================================================================
# БЛОКИ-ЗАГЛУШКИ ДЛЯ БОТОВ
# =========================================================================

# HTTP Заглушка: рвем соединение для всех, кроме запросов к нашему домену
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    
    access_log off;
    error_log off;
    return 444; 
}

# HTTPS Заглушка: рвем соединение, если стучатся по IP напрямую
server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name _;

    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;

    access_log off;
    error_log off;
    return 444;
}

# Редирект с HTTP на HTTPS
server {
    listen 80;
    server_name project-domain.ru www.project-domain.ru;
    return 301 https://project-domain.ru$request_uri;
}

# Основной HTTPS сервер
server {
    listen 443 ssl http2;
    server_name project-domain.ru;
    
    # Блокировка известных сканеров по User-Agent
    if ($http_user_agent ~* (zgrab|l9scan|leakix|infrawatch|netscope|libredtail|censys|shodan|cyberxray)) {
        return 444;
    }
    
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Security headers
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    server_tokens off;

    client_max_body_size 50M;

    # SSL Certificates
    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;

    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Gzip Compression
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;
    gzip_min_length 1000;

    location /api/ {
        rewrite ^/api(/.*)$ $1 break;
        proxy_pass http://gateway-service;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host gateway-service;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy
    location / {
        proxy_pass http://client:5173;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Real-IP $remote_addr;
        
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}