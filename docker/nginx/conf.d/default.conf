limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
map_hash_bucket_size 128;

upstream gateway-service {
    server gateway-service:5000;
}

# Если у тебя есть отдельный контейнер фронта, раскомментируй это:
# upstream client-service {
#     server client-service:3000; 
# }

# === HTTP to HTTPS Redirect ===
server {
    listen 80;
    server_name project-domain.ru 185.56.162.117;
    return 301 https://project-domain.ru$request_uri; # Жесткий редирект на домен
}

# === HTTPS server ===
server {
    listen 443 ssl http2;
    server_name project-domain.ru 185.56.162.117;

    # Security headers
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    server_tokens off;

    client_max_body_size 50M;

    # SSL SSL Certificates
    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;

    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Gzip Compression
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;
    gzip_min_length 1000;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # === API proxy ===
    location /api/ {
        proxy_pass http://gateway-service; # Убрали слэш в конце, чтобы не резать /api/
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        limit_req zone=api_limit burst=20 nodelay;
    }

    # === Frontend / Client Proxy ===
    location / {
        auth_basic "Restricted Area"; # Исправили ломающуюся переменную
        auth_basic_user_file /etc/nginx/conf.d/.htpasswd;
        
        proxy_pass http://gateway-service/;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}