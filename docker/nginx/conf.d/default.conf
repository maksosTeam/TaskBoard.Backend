limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

map_hash_bucket_size 128;

map $http_x_app_secret $auth_status {
    "AAUMisSb1yxKapDSZbWKvNCUEFQJaM7Zwa4ViPSxMhGsi9bWk7mJBjOlvc9w" "off";
    default "Restricted Access";
}

map $http_origin $cors_origin {
    default "";
    "~^https?://ddc\.egd\.ru$" "$http_origin";
    "~^http://localhost:8081$"        "$http_origin";
    "~^http://localhost:5173$" "$http_origin";
}

upstream deputy_api {
    server deputy-api:7001;
}

upstream minio_console {
    server minio:9001;
}
upstream minio_api {
    server minio:9000;
}

# === HTTP → HTTPS redirect ===
server {
    listen 80;
    server_name ddc.egd.ru 5.165.226.209;
    return 301 https://$host$request_uri;
}

# === HTTPS server ===
server {
    listen 443 ssl http2;
    server_name ddc.egd.ru;

    # Security headers
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    server_tokens off;

    client_max_body_size 50M;

    # === SSL certificates (обновлённые пути) ===
    ssl_certificate /etc/nginx/ssl/ddc_egd_ru.full.crt;
    ssl_certificate_key /etc/nginx/ssl/ddc_egd_ru.key;

    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    gzip on;
    gzip_types text/plain application/json application/javascript text/css;
    gzip_min_length 1000;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # === API proxy ===
    location /api/ {
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-App-Secret, X-Requested-With, Accept' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Content-Length' 0;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            return 204;
        }

        auth_basic $auth_status;
        auth_basic_user_file /etc/nginx/conf.d/.htpasswd;

        proxy_pass http://deputy_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        limit_req zone=api_limit burst=20 nodelay;
    }

    location = /api/Auth/login {
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Requested-With, Accept' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Content-Length' 0;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            return 204;
        }
        
        auth_basic off;
        
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Allow-Credentials;
        
        proxy_pass http://deputy_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        add_header 'Access-Control-Allow-Origin' $cors_origin always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Requested-With, Accept' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;

        limit_req zone=api_limit burst=20 nodelay;
    }

    # === Minio Console ===
    location /minio/ {
        proxy_pass http://minio_console/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        rewrite ^/minio/(.*)$ /$1 break;
    }

    # === Minio API ===
    location /minio-api/ {
        proxy_pass http://minio_api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        rewrite ^/minio-api/(.*)$ /$1 break;
    }

    # === Main app (WebSocket support) ===
    location / {
        auth_basic $auth_status;
        auth_basic_user_file /etc/nginx/conf.d/.htpasswd;
        proxy_pass http://deputy_api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # === Static files ===
    location /static/ {
        auth_basic off;
        alias /usr/share/nginx/static/;
        expires 30d;
    }

    # === Expo/PWA endpoints ===
    location /_expo/ {
        auth_basic off;
        proxy_pass http://frontend:8081/_expo/;
        proxy_set_header Host $host;
    }

    location /assets/ {
        auth_basic off;
        proxy_pass http://frontend:8081/assets/;
        proxy_set_header Host $host;
    }

    location = /pwa {
        return 301 $scheme://$host/pwa/;
    }

    location /pwa/ {
        auth_basic off;
        proxy_pass http://frontend:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}