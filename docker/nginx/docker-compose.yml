services:
  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./conf.d:/etc/nginx/conf.d:ro
      - ./static:/usr/share/nginx/static:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./logs:/var/log/nginx 
    networks:
      - taskboard-network
    restart: unless-stopped