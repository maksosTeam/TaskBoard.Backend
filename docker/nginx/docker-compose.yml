  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./static:/usr/share/nginx/static:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
      # - telegram-api
      - minio
    networks:
      - deputy-net
    restart: unless-stopped

volumes:
  pgdata:
  miniodata:

networks:
  deputy-net:
