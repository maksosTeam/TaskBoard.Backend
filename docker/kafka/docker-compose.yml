version: "3.9"

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    ports:
      - "2181:2181"
    networks:
      - taskboard-network
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 3

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"   # Порт для внешнего мира (твоего хоста / приложений вне Docker)
      - "29092:29092" # Порт для внутренней сети Docker
    networks:
      - taskboard-network
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      
      # Настраиваем два слушателя: INTERNAL для Docker, EXTERNAL для хоста
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      
      # Полезные настройки для стабильности в Docker-окружении
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "127.0.0.1:29092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka-init-topics:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka-init-topics
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - taskboard-network
    entrypoint: [ "bin/sh", "-c" ]
    command: |
      "
      echo 'Waiting for Kafka to settle...'
      sleep 3;
      
      # 1. Топики для GetItemsByProject
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic get-items-by-project-request --replication-factor 1 --partitions 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic get-items-by-project-response --replication-factor 1 --partitions 1
      
      # 2. Топики для GetItemById
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic get-item-by-id-request --replication-factor 1 --partitions 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic get-item-by-id-response --replication-factor 1 --partitions 1
      
      # 3. Топики для GetProjectById
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic get-project-by-id-request --replication-factor 1 --partitions 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic get-project-by-id-response --replication-factor 1 --partitions 1
      
      # 4. Топики уведомлений, комментариев и инвайтов
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic new-task --replication-factor 1 --partitions 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic new-comment --replication-factor 1 --partitions 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic new-invite --replication-factor 1 --partitions 1
      
      echo 'All taskboard topics have been created successfully!'
      "

networks:
  taskboard-network:
    name: taskboard-network
    driver: bridge